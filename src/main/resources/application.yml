  merchant-count: 100
  payment-count: 100000
  target-date-payment-count: 70000
  target-date: 2026-05-08
  batch-size: 1000

benchmark:
  profile: small
  reset-enabled: false
  merchant-count: 100
  payment-count: 100000
  batch-size: 1000
  target-date-sync-enabled: true
